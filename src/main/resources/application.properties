spring.application.name=video-processor

# Configurações de Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Configurações do Bucket S3
aws.s3.bucket=${S3_BUCKET:${TF_BUCKET_NAME:process-video-midia}}
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.concurrency=${RABBITMQ_CONCURRENCY:2}
spring.rabbitmq.listener.simple.max-concurrency=${RABBITMQ_MAX_CONCURRENCY:5}
spring.rabbitmq.listener.simple.prefetch=${RABBITMQ_PREFETCH:1}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.max-attempts=${RABBITMQ_RETRY_MAX:3}
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# RabbitMQ Queue Config
rabbitmq.queue.name=${RABBITMQ_QUEUE_NAME:${RABBITMQ_QUEUE:video-processing-queue}}
rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME:${RABBITMQ_EXCHANGE:video-processing-exchange}}
rabbitmq.routing-key=${RABBITMQ_ROUTING_KEY:video.processing}

# Configurações de Notificação (Endpoint Externo)
notification.endpoint.url=${NOTIFICATION_URL:${URL_MS_API:http://localhost:8888}/api/capturas/update-status}

# Configurações de e-mail (opcional)
mail.enabled=${MAIL_ENABLED:false}
mail.from=${MAIL_FROM:${EMAIL_USER:${spring.mail.username:}}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PWD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# splitter seconds
splitter.interval-seconds=${SPLITTER_INTERVAL_SECONDS:10}

# Logging
logging.level.com.example.videoprocessor=DEBUG

# Configuração de Storage Local (Para testes)
storage.local.path=./capturas-validacao

# Actuator/Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.health.mail.enabled=false
