name: Terraform Deploy

on:
  push:
    branches:
      - homolog

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_REP }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_REP }}
          aws-region: ${{ secrets.AWS_REGION_REP }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_REP }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ secrets.TF_BUCKET_NAME_REP }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="bucket_name=${{ secrets.TF_BUCKET_NAME_REP }}"
